name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  NODE_VERSION: "22"

jobs:
  ci:
    # No longer needs the forgegraf-docker label / docker-in-docker: postgres
    # is now provided by @gmacko/emulate (a PGlite-backed wire-protocol mock
    # spawned as a plain Node subprocess by test/emulate-setup.ts's vitest
    # globalSetup, coordinated across @bob/db + @bob/api via a lock file --
    # see that file for details). This removes both the fragile dependency on
    # hetzner-bob's narrowly-scoped docker runner label and the "port is
    # already allocated" failures two concurrent job runs used to hit when
    # both tried to bind host port 5432 for their own postgres service
    # container.
    #
    # `@bob/api` (~21 test files) and `@bob/db` (its own vitest suite) require
    # a live Postgres at postgres://postgres:postgres@localhost:5432/test --
    # see those packages' test files for the hardcoded connection string, and
    # test/emulate-setup.ts / emulate.config.yaml for how it's now served.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: https://github.com/pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Start emulated Postgres (@gmacko/emulate)
        # `drizzle-kit push` below runs as its own step, outside vitest's
        # globalSetup (test/emulate-setup.ts) which only starts on-demand when
        # a test file first imports it -- so start the emulator explicitly
        # here and leave it running for both this step and `pnpm test` after
        # it. See test/emulate-setup.ts for the lock/coordination logic that
        # lets @bob/db and @bob/api's own vitest processes detect this
        # already-running instance instead of racing to start a second one.
        run: |
          mkdir -p data/pglite
          nohup npx @gmacko/emulate start -s postgres --seed emulate.config.yaml \
            > /tmp/emulate.log 2>&1 &
          echo "Waiting for emulated postgres wire protocol on :5432..."
          for i in $(seq 1 90); do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Emulated postgres never came up on :5432"
          cat /tmp/emulate.log
          exit 1

      - name: Push @bob/db schema to CI Postgres
        working-directory: packages/bob/src/db
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
        # drizzle-kit push introspects schema.ts directly and generates a
        # from-scratch schema -- this is the same mechanism client-pglite.ts
        # uses to bootstrap an empty PGlite DB (see its `generateDrizzleJson`/
        # `generateMigration` comments). The incremental SQL files under
        # drizzle/*.sql do NOT compose into a from-scratch schema (they're
        # patches on a pre-existing baseline -- see migrate.ts's docstring),
        # so `pnpm migrate` is not viable here; `push --force` is.
        run: pnpm exec drizzle-kit push --force

      - name: Test
        # DATABASE_URL is intentionally NOT set here (unlike the old Docker
        # service-container CI). `turbo run test` runs every package's test
        # script, and a step-level env var would leak into all of them --
        # @gmacko/ooda's listen-broker.test.ts gates its Postgres LISTEN/
        # NOTIFY suite on DATABASE_URL being set, and the emulator's
        # PGlite-backed postgres doesn't support LISTEN/NOTIFY. @bob/db and
        # @bob/api set DATABASE_URL themselves via their own vitest.config.ts
        # `test.env`, scoping it to only the packages that need it.
        run: pnpm test

      - name: Report CI result to ForgeGraph
        if: always()
        env:
          FG_CI_TOKEN: ${{ secrets.FG_CI_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          elif [ "${{ job.status }}" = "cancelled" ]; then
            STATUS="cancelled"
          else
            STATUS="failure"
          fi

          REPO_FULL="${{ github.repository }}"
          OWNER="${REPO_FULL%%/*}"
          REPO="${REPO_FULL##*/}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          # On pull_request events github.sha is the test-merge commit, not the branch
          # head. Report the head SHA so it matches the ForgeGraph changeset's git_sha.
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"

          if [ -z "${FG_CI_TOKEN}" ]; then
            echo "::warning::FG_CI_TOKEN is empty — CI result will NOT be reported to ForgeGraph (forge ci status will stay 'unknown')"
          fi

          # Capture the HTTP status so a failed/unauthenticated report is visible in
          # the logs instead of being silently swallowed.
          HTTP=$(curl -s -o /tmp/fg_report.out -w "%{http_code}" -X POST "https://forgegraf.com/api/fg/ci/report" \
            -H "Authorization: Bearer ${FG_CI_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"owner\": \"${OWNER}\",
              \"repo\": \"${REPO}\",
              \"sha\": \"${SHA}\",
              \"branch\": \"${BRANCH}\",
              \"status\": \"${STATUS}\",
              \"runId\": \"${{ github.run_id }}\",
              \"runUrl\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"workflowName\": \"CI\"
            }")
          echo "ForgeGraph CI report: HTTP ${HTTP}"
          if [ "${HTTP}" -lt 200 ] || [ "${HTTP}" -ge 300 ]; then
            echo "::warning::ForgeGraph CI report failed (HTTP ${HTTP}): $(cat /tmp/fg_report.out 2>/dev/null)"
          fi

  # Continuous deploy: ship the web app to bob.blder.bot after CI passes on master.
  #
  # Requires repo secrets:
  #   CLOUDFLARE_API_TOKEN   - token with Workers Scripts:Edit + Hyperdrive read
  #   CLOUDFLARE_ACCOUNT_ID  - c07a7e704db1808e1fff91bed2b1cd49
  #
  # NOTE: this is a CODE-ONLY deploy. The `predeploy` DB migration
  # (scripts/migrate-hetzner.sh) reaches Postgres over Tailscale and cannot run
  # on a cloud runner, so it's intentionally skipped here (we call `vinext deploy`
  # directly, not `pnpm deploy`). When a deploy includes schema changes, run
  # migrations first from a Tailscale-connected host:
  #   DATABASE_URL=$(forge db url --app bob) pnpm -F @bob/db migrate
  # (or use scripts/rotate-bob-db-password.sh's stable creds). To make this fully
  # automated, move this job to a self-hosted runner on the Tailscale mesh.
  deploy:
    name: Deploy web to bob.blder.bot
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: https://github.com/pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy CF Worker (vinext deploy, code-only)
        working-directory: apps/bob
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec vinext deploy
