name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  NODE_VERSION: "22"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: https://github.com/pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Report CI result to ForgeGraph
        if: always()
        env:
          FG_CI_TOKEN: ${{ secrets.FG_CI_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          elif [ "${{ job.status }}" = "cancelled" ]; then
            STATUS="cancelled"
          else
            STATUS="failure"
          fi

          REPO_FULL="${{ github.repository }}"
          OWNER="${REPO_FULL%%/*}"
          REPO="${REPO_FULL##*/}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          # On pull_request events github.sha is the test-merge commit, not the branch
          # head. Report the head SHA so it matches the ForgeGraph changeset's git_sha.
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"

          if [ -z "${FG_CI_TOKEN}" ]; then
            echo "::warning::FG_CI_TOKEN is empty — CI result will NOT be reported to ForgeGraph (forge ci status will stay 'unknown')"
          fi

          # Capture the HTTP status so a failed/unauthenticated report is visible in
          # the logs instead of being silently swallowed.
          HTTP=$(curl -s -o /tmp/fg_report.out -w "%{http_code}" -X POST "https://forgegraf.com/api/fg/ci/report" \
            -H "Authorization: Bearer ${FG_CI_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"owner\": \"${OWNER}\",
              \"repo\": \"${REPO}\",
              \"sha\": \"${SHA}\",
              \"branch\": \"${BRANCH}\",
              \"status\": \"${STATUS}\",
              \"runId\": \"${{ github.run_id }}\",
              \"runUrl\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"workflowName\": \"CI\"
            }")
          echo "ForgeGraph CI report: HTTP ${HTTP}"
          if [ "${HTTP}" -lt 200 ] || [ "${HTTP}" -ge 300 ]; then
            echo "::warning::ForgeGraph CI report failed (HTTP ${HTTP}): $(cat /tmp/fg_report.out 2>/dev/null)"
          fi
