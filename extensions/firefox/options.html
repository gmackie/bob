<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #e5e5e5;
        max-width: 400px;
        margin: 40px auto;
        padding: 20px;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        color: #a3a3a3;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 16px;
        background: #171717;
        border: 1px solid #262626;
        border-radius: 6px;
        color: #e5e5e5;
        font-size: 14px;
      }
      button {
        padding: 10px 20px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #1d4ed8;
      }
      .saved {
        color: #4ade80;
        margin-top: 12px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>BizPulse Cookie Bridge Settings</h1>
    <label for="url">BizPulse URL</label>
    <input type="url" id="url" placeholder="https://bob.tail1e1a32.ts.net" />
    <label for="key">API Key</label>
    <input type="password" id="key" placeholder="gmk_..." />
    <button id="save">Save</button>
    <div class="saved" id="saved" style="display: none">Settings saved.</div>
    <script src="options.js"></script>
  </body>
</html>
