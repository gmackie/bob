<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      font-size: 14px;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #262626;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .status {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }
    .status.ok { background: #22c55e; }
    .status.err { background: #ef4444; }
    .main { padding: 16px; }
    .send-btn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .result.success { background: #052e16; color: #4ade80; display: block; }
    .result.error { background: #450a0a; color: #f87171; display: block; }
    .advanced-toggle {
      margin-top: 12px;
      font-size: 12px;
      color: #737373;
      cursor: pointer;
      user-select: none;
    }
    .advanced-toggle:hover { color: #a3a3a3; }
    .domain-picker {
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }
    .domain-picker.open { display: block; }
    .domain-picker input[type="text"] {
      width: 100%;
      padding: 8px;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .domain-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
    }
    .domain-item input[type="checkbox"] { accent-color: #2563eb; }
    .not-configured {
      padding: 16px;
      text-align: center;
      color: #737373;
      font-size: 13px;
    }
    .not-configured a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Bob Cookie Bridge</h1>
    <span class="status" id="status"></span>
  </div>
  <div id="not-configured" class="not-configured" style="display:none;">
    Not configured. <a href="#" id="open-options">Set up Bob URL and API key</a>
  </div>
  <div class="main" id="main" style="display:none;">
    <button class="send-btn" id="send-btn">
      Send cookies for <strong id="domain-label">...</strong> to Bob
    </button>
    <div class="result" id="result"></div>
    <div class="advanced-toggle" id="advanced-toggle">&#9662; Advanced: pick multiple domains</div>
    <div class="domain-picker" id="domain-picker">
      <input type="text" id="domain-search" placeholder="Search domains...">
      <div id="domain-list"></div>
      <button class="send-btn" id="send-selected-btn" style="margin-top:8px;">
        Send selected domains
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
