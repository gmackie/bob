name: Web App CI/CD

on:
  pull_request:
    paths:
      - ".github/workflows/web-app.yml"
      - "apps/blder/**"
      - "packages/**"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-app.yml"
      - "apps/blder/**"
      - "packages/**"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-app-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.19.0"
  BOB_BUILD_TARGET: cloudflare
  NODE_ENV: production

jobs:
  build:
    name: Build web app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web app
        run: pnpm -F @bob/blder typecheck

      - name: Build web app
        run: pnpm -F @bob/blder build

  deploy:
    name: Deploy web app
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: production

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_USER: ${{ secrets.HETZNER_SSH_USER }}
      HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deploy secrets
        run: |
          missing=0

          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN HETZNER_SSH_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for production web deploys."
              missing=1
            fi
          done

          exit "${missing}"

      - name: Configure migration SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -n "${HETZNER_HOST}" ]; then
            ssh-keyscan -H "${HETZNER_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Deploy to Cloudflare Workers
        run: pnpm -F @bob/blder deploy
