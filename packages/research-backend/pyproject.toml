[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/research_backend"]

[project]
name = "ooda-research-backend"
license = "MIT"
version = "0.1.0"
description = "Python FastAPI sidecar for research operations (paper discovery, KB compile, embeddings, clustering)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "asyncpg>=0.30.0",
    "httpx>=0.28.0",
    "pyyaml>=6.0.2",
    "pydantic-settings>=2.7.0",
    "sqlmodel>=0.0.22",
    "psycopg2-binary>=2.9.9",
    "pymupdf>=1.25.0",
    "pydantic>=2.10.0",
    "python-multipart>=0.0.9",
    "numpy>=2.0.0",
    "hdbscan>=0.8.40",
    "apscheduler>=3.11.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=1.1.0",
    "ruff>=0.11.0",
]

[project.scripts]
buddy-tick = "research_backend.schedulers.cli:main"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
