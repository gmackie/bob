appId: com.gmacko.bob.dev
---
# Build/install with production endpoints, EXPO_PUBLIC_BOB_AUTH_BYPASS=true,
# and EXPO_PUBLIC_BOB_AUTH_BYPASS_TOKEN set to the backend bypass secret.
- launchApp:
    clearState: true
- openLink: exp+bob://expo-development-client/?url=http%3A%2F%2F192.168.8.229%3A8081
- tapOn:
    text: "Bob \\(Dev\\)"
    optional: true
- extendedWaitUntil:
    visible: "Continue"
    timeout: 45000
- tapOn:
    text: "Continue"
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible: "Tasks"
    timeout: 30000
- assertNotVisible: "Dashboard"
- assertVisible: "Planning"
- assertVisible: "Tasks"
- assertVisible:
    text: "Operations"
- assertVisible:
    text: "Recently Completed"
- openLink: bob://planning
- assertVisible:
    id: "tablet-tab-recent-sessions"
- assertVisible:
    id: "tablet-tab-projects"
- assertNotVisible: "Dashboard"
- openLink: bob://tasks
- assertVisible:
    id: "tablet-tab-recent-outcomes"
- assertVisible:
    id: "tablet-tab-priority-queue"
- takeScreenshot: screenshots/05-tablet-planning-shell
