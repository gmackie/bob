# Included inside the claude.gmac.io TLS server block. ForgeGraph manages the
# proxied DNS record; nginx remains the node's TLS ingress.
location = /hermes {
    return 308 /hermes/;
}

location = /_bob_hermes_auth {
    internal;
    proxy_pass https://bob.blder.bot/api/trpc/workspace.list?input=%7B%22json%22%3Anull%7D;
    proxy_ssl_server_name on;
    proxy_ssl_name bob.blder.bot;
    proxy_set_header Host bob.blder.bot;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
}

location /hermes/ {
    auth_request /_bob_hermes_auth;
    proxy_pass http://127.0.0.1:9119/;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-Prefix /hermes;
    proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 300s;
}
